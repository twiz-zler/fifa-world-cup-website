<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
            .card {
            border-radius: 8px;
            border: 2px solid #007bff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: #ffffff;
        }   
    </style>
    <title>Web Dev Final Project</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Fifa Home</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./tickets.html">Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="./merch.html">Merch</a></li>
                    <li class="nav-item"><a class="nav-link" href="./checkout.html">Checkout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <br><br>
        <h1 style="text-align: center;">Fifa World Cup 2026 Merch</h1>
        <br><br>

        <div class="row">

            <div class="col-md-4">
                <div class="card">
                    <img src="media/ball1.png" class="card-img-top">
                    <div class="card-body">
                        <h5>The Trionda</h5>
                        <form id="merch1Form">
                            <label>Quantity:</label>
                            <input id="merch1Qty" type="number" class="form-control mb-2">
                            <button id="merch1Btn" class="btn btn-primary">Buy Merch</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="media/usa.webp" class="card-img-top">
                    <div class="card-body">
                        <h5>USA Men's Jersey</h5>
                        <form id="merch2Form">
                            <label>Quantity:</label>
                            <input id="merch2Qty" type="number" class="form-control mb-2">
                            <button id="merch2Btn" class="btn btn-primary">Buy Merch</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="media/england.webp" class="card-img-top">
                    <div class="card-body">
                        <h5>England Men's Jersey</h5>
                        <form id="merch3Form">
                            <label>Quantity:</label>
                            <input id="merch3Qty" type="number" class="form-control mb-2">
                            <button id="merch3Btn" class="btn btn-primary">Buy Merch</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 FIFA World Cup — Fan Store & Tickets
    </footer>

    <script src="script.js"></script>
</body>

</html>
