<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
            .card {
            border-radius: 8px;
            border: 2px solid #007bff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: #ffffff;
        }   
    </style>
    <title>Web Dev Final Project</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">Fifa Home</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./tickets.html">Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="./merch.html">Merch</a></li>
                    <li class="nav-item"><a class="nav-link" href="./checkout.html">Checkout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <br><br>
        <h1 style="text-align: center;">Fifa World Cup 2026 Tickets</h1>
        <br><br>

        
        <div class="card mb-3">
            <img src="media/stadium10.webp" class="card-img-top" alt="Mercedes Benz Stadium">
            <div class="card-body">
                <h5 class="card-title">Mercedes Benz Stadium Tickets</h5>
                <p>Knockout stages: $500</p>

                <form id="ticket1Form">
                    <label>Quantity:</label>
                    <input id="ticket1Qty" type="number" class="form-control mb-2">
                    <button id="ticket1Btn" class="btn btn-primary">Buy Tickets</button>
                </form>
            </div>
        </div>

        
        <div class="card mb-3">
            <img src="media/617f69ca-e182-4f78-8f9d-9dd799ae2af1.png" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">BMO Field Tickets</h5>
                <p>Knockout stages: $300</p>

                <form id="ticket2Form">
                    <label>Quantity:</label>
                    <input id="ticket2Qty" type="number" class="form-control mb-2">
                    <button id="ticket2Btn" class="btn btn-primary">Buy Tickets</button>
                </form>
            </div>
        </div>

        
        <div class="card mb-3">
            <img src="media/stadium20.jpeg" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">SoFi Stadium Tickets</h5>
                <p>Knockout stages: $750</p>

                <form id="ticket3Form">
                    <label>Quantity:</label>
                    <input id="ticket3Qty" type="number" class="form-control mb-2">
                    <button id="ticket3Btn" class="btn btn-primary">Buy Tickets</button>
                </form>
            </div>
        </div>

    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 FIFA World Cup — Fan Store & Tickets
    </footer>

    <script src="script.js"></script>
</body>

</html>
